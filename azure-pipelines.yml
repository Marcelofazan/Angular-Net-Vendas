trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.0.x'

stages:
- stage: Build_Angular
  displayName: 'Build Angular Application'
  jobs:
  - job: BuildClient
    displayName: 'npm install and build'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        # 1. Localiza a pasta onde o projeto Angular está
        ANGULAR_PATH=$(find . -name "angular.json" -exec dirname {} \;)
        
        if [ -z "$ANGULAR_PATH" ]; then
          echo "ERRO: O arquivo angular.json não foi encontrado!"
          exit 1
        fi
        
        echo "Projeto Angular localizado em: $ANGULAR_PATH"
        cd "$ANGULAR_PATH"
        
        # 2. Instala dependências
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
        
        # 3. Executa o build
        npm run build -- --configuration production
        
        # 4. MAPEAMENTO DINÂMICO DA PASTA DIST (Resolve o erro Path does not exist)
        # Busca o diretório exato dentro de 'dist' que contém o arquivo index.html
        DIST_TARGET=$(find dist -name "index.html" -exec dirname {} \; | head -n 1)
        
        if [ -z "$DIST_TARGET" ]; then
          echo "ERRO: O build do Angular não gerou nenhum arquivo index.html dentro da pasta dist!"
          ls -la dist/
          exit 1
        fi
        
        # Cria um caminho absoluto para o Azure Pipelines não se perder
        FULL_DIST_PATH="$(pwd)/$DIST_TARGET"
        echo "Arquivos de produção encontrados em: $FULL_DIST_PATH"
        
        # Cria a variável que a tarefa 'publish' vai ler no próximo passo
        echo "##vso[task.setvariable variable=detectedAngularDist]$FULL_DIST_PATH"
      displayName: 'Angular 17 Build (Auto-Detect Dist)'

    - publish: $(detectedAngularDist)
      artifact: 'angular-dist'
      displayName: 'Publish Angular Artifacts'

- stage: Build_DotNet
  displayName: 'Build and Publish .NET API'
  jobs:
  - job: BuildAPI
    displayName: 'dotnet build and publish'
    steps:
    - task: UseDotNet@2
      inputs:
        version: '$(dotnetVersion)'
        packageType: 'sdk'
      displayName: 'Install .NET SDK'

    - script: |
        # Busca automaticamente a pasta que contém o arquivo de solução (.sln) ou projeto (.csproj)
        NET_PATH=$(find . -name "*.sln" -o -name "*.csproj" -exec dirname {} \; | head -n 1)
        
        if [ -z "$NET_PATH" ]; then
          echo "ERRO: Nenhum arquivo .sln ou .csproj foi encontrado no repositório!"
          exit 1
        fi
        
        echo "Projeto .NET localizado em: $NET_PATH"
        cd "$NET_PATH"
        
        dotnet restore
        dotnet build --configuration $(buildConfiguration)
        dotnet publish --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/ApiPublish
      displayName: '.NET 10 Build and Publish (Auto-Detect)'

    - publish: $(Build.ArtifactStagingDirectory)/ApiPublish
      artifact: 'dotnet-api'
      displayName: 'Publish .NET Artifacts'
